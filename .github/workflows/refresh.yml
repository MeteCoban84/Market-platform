name: refresh-market-data
on: { workflow_dispatch: {}, schedule: [ { cron: '*/15 8-21 * * 1-5' } ] }
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node fetch-data.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data.json
          git commit -m refresh || true
          git push
